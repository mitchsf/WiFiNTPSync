paragraph=Blocking bootWiFiAndNTP() and non-blocking serviceWiFiAndNTP() with display/side-effect hooks (progress, reconnect, timeout). Built on NTP2. Handles WiFi connect, DHCP settle, DNS pre-warm, NTP sync with primary/alternate rotation, and runtime reconnect/rotation — with no project-specific assumptions.
